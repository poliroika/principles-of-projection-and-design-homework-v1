server.port=${SERVER_PORT:8080}
spring.application.name=currency-rate-provider
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
app.version=${APP_VERSION:local}
rate.base-value=${RATE_BASE_VALUE:92.0}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus,metrics}
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.version=${app.version}
management.metrics.distribution.percentiles-histogram.rate.provider.request=true
management.metrics.distribution.percentiles.rate.provider.request=0.5,0.95,0.99

info.application=${spring.application.name}
info.version=${app.version}

logging.file.name=
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%level service=${spring.application.name} version=${app.version} thread=%thread logger=%logger{36} - %msg%n
