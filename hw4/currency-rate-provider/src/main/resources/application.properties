server.port=8080
spring.application.name=currency-rate-provider
app.version=1.0.0

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.rate.provider.request=true
management.metrics.distribution.percentiles.rate.provider.request=0.5,0.95,0.99
