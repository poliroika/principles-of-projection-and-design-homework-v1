services:
  pact-postgres:
    image: postgres:16-alpine
    container_name: hw4-pact-postgres
    environment:
      POSTGRES_DB: pact_broker
      POSTGRES_USER: pact
      POSTGRES_PASSWORD: pact
    ports:
      - "5432:5432"

  pact-broker:
    image: pactfoundation/pact-broker:latest
    container_name: hw4-pact-broker
    depends_on:
      - pact-postgres
    ports:
      - "9292:9292"
    environment:
      PACT_BROKER_DATABASE_ADAPTER: postgres
      PACT_BROKER_DATABASE_HOST: pact-postgres
      PACT_BROKER_DATABASE_NAME: pact_broker
      PACT_BROKER_DATABASE_USERNAME: pact
      PACT_BROKER_DATABASE_PASSWORD: pact
      PACT_BROKER_DATABASE_CONNECT_MAX_RETRIES: "10"
      PACT_BROKER_BASE_URL: http://localhost:9292

  zookeeper:
    image: zookeeper:3.9
    container_name: hw4-zookeeper
    ports:
      - "2181:2181"
      - "7000:7000"
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: mntr,ruok,conf
      JVMFLAGS: "-javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=7000:/opt/jmx/zookeeper.yml"
    volumes:
      - ./monitoring/jmx:/opt/jmx:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: hw4-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - zookeeper

  grafana:
    image: grafana/grafana:11.3.0
    container_name: hw4-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
